<!DOCTYPE html>
<html>
<head>
<title>Dado 3D Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
text-align:center;
overflow:hidden;
}

h1{
margin-top:50px;
}

.scene{
width:150px;
height:150px;
margin:60px auto;
perspective:600px;
}

.cube{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 1s;
}

.face{
position:absolute;
width:150px;
height:150px;
background:white;
border:4px solid #ddd;
display:flex;
flex-wrap:wrap;
padding:20px;
box-sizing:border-box;
}

.dot{
width:20px;
height:20px;
background:black;
border-radius:50%;
margin:auto;
}

.front{ transform: rotateY(0deg) translateZ(75px); }
.back{ transform: rotateY(180deg) translateZ(75px); }
.right{ transform: rotateY(90deg) translateZ(75px); }
.left{ transform: rotateY(-90deg) translateZ(75px); }
.top{ transform: rotateX(90deg) translateZ(75px); }
.bottom{ transform: rotateX(-90deg) translateZ(75px); }

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;
margin:10px;
}

#stats{
margin-top:30px;
font-size:20px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.stat{
background:#1e293b;
padding:10px 15px;
border-radius:8px;
}

</style>
</head>

<body>

<h1>🎲 Tirar el Dado</h1>

<div class="scene">
<div class="cube" id="cube">

<div class="face front">
<div class="dot"></div>
</div>

<div class="face back">
<div class="dot"></div><div></div><div class="dot"></div>
<div></div><div class="dot"></div><div></div>
<div class="dot"></div>
</div>

<div class="face right">
<div class="dot"></div><div></div><div class="dot"></div>
</div>

<div class="face left">
<div class="dot"></div><div></div><div class="dot"></div>
<div></div><div class="dot"></div><div></div>
<div class="dot"></div>
</div>

<div class="face top">
<div class="dot"></div><div></div><div class="dot"></div>
<div class="dot"></div><div></div><div class="dot"></div>
</div>

<div class="face bottom">
<div class="dot"></div><div></div><div class="dot"></div>
<div></div><div class="dot"></div><div></div>
<div class="dot"></div><div></div><div class="dot"></div>
</div>

</div>
</div>

<button onclick="roll()">Tirar dado</button>
<button onclick="reset()">Reiniciar</button>

<h2 id="resultado"></h2>

<div id="stats">
<div class="stat">1: <span id="c1">0</span></div>
<div class="stat">2: <span id="c2">0</span></div>
<div class="stat">3: <span id="c3">0</span></div>
<div class="stat">4: <span id="c4">0</span></div>
<div class="stat">5: <span id="c5">0</span></div>
<div class="stat">6: <span id="c6">0</span></div>
</div>

<script>

let contador=[0,0,0,0,0,0];

const cube=document.getElementById("cube");

function roll(){

let n=Math.floor(Math.random()*6)+1;

let rotaciones={
1:"rotateX(0deg) rotateY(0deg)",
2:"rotateX(-90deg)",
3:"rotateY(90deg)",
4:"rotateY(-90deg)",
5:"rotateX(90deg)",
6:"rotateY(180deg)"
};

cube.style.transform="rotateX(720deg) rotateY(720deg)";

setTimeout(()=>{

cube.style.transform=rotaciones[n];

document.getElementById("resultado").innerHTML="Salió el número: "+n;

contador[n-1]++;

for(let i=1;i<=6;i++){
document.getElementById("c"+i).innerHTML=contador[i-1];
}

},1000);

}

function reset(){

contador=[0,0,0,0,0,0];

for(let i=1;i<=6;i++){
document.getElementById("c"+i).innerHTML=0;
}

document.getElementById("resultado").innerHTML="";

cube.style.transform="rotateX(0deg) rotateY(0deg)";

}

</script>

</body>
</html>
