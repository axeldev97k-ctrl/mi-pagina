<!DOCTYPE html>
<html>
<head>
<title>Dado Pro</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(270deg,#0f172a,#020617,#1e293b);
background-size:600% 600%;
animation:fondo 10s infinite;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
margin-top:60px;
}

#dice{
font-size:120px;
margin:30px;
transition: transform 0.7s;
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

#stats{
margin-top:30px;
font-size:18px;
}

</style>

</head>

<body>

<h1>🎲 Tirar el Dado</h1>

<div id="dice">⚀</div>

<button onclick="rollDice()">Tirar dado</button>

<h2 id="resultado"></h2>

<div id="stats">
1️⃣: <span id="c1">0</span> |
2️⃣: <span id="c2">0</span> |
3️⃣: <span id="c3">0</span> |
4️⃣: <span id="c4">0</span> |
5️⃣: <span id="c5">0</span> |
6️⃣: <span id="c6">0</span>
</div>

<audio id="sound">
<source src="https://www.soundjay.com/misc/sounds/dice-roll-1.mp3">
</audio>

<script>

let contador=[0,0,0,0,0,0];

function rollDice(){

let numero=Math.floor(Math.random()*6)+1;

let dados=["⚀","⚁","⚂","⚃","⚄","⚅"];

document.getElementById("dice").style.transform=
"rotate("+(Math.random()*720)+"deg)";

document.getElementById("sound").play();

setTimeout(()=>{

document.getElementById("dice").innerHTML=dados[numero-1];

document.getElementById("resultado").innerHTML=
"Salió el número: "+numero;

contador[numero-1]++;

for(let i=1;i<=6;i++){

document.getElementById("c"+i).innerHTML=contador[i-1];

}

},300);

}

</script>

</body>
</html>
