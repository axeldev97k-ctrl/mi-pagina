<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Dado Aleatorio</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
margin-top:50px;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.scene{
width:150px;
height:150px;
margin:80px auto;
perspective:600px;
}

.cube{
width:150px;
height:150px;
position:relative;
transform-style:preserve-3d;
transition:transform 1.3s;
}

.face{
position:absolute;
width:150px;
height:150px;
background:white;
border:6px solid #ddd;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
padding:15px;
box-sizing:border-box;
}

.dot{
width:18px;
height:18px;
background:black;
border-radius:50%;
align-self:center;
justify-self:center;
}

.front{ transform:rotateY(0deg) translateZ(75px); }
.back{ transform:rotateY(180deg) translateZ(75px); }
.right{ transform:rotateY(90deg) translateZ(75px); }
.left{ transform:rotateY(-90deg) translateZ(75px); }
.top{ transform:rotateX(90deg) translateZ(75px); }
.bottom{ transform:rotateX(-90deg) translateZ(75px); }

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:12px;
background:#38bdf8;
color:white;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

#resultado{
margin-top:20px;
font-size:24px;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>🎲 Dado Aleatorio</h1>

<div class="scene">
<div class="cube" id="cube">

<div class="face front">
<div></div><div></div><div></div>
<div></div><div class="dot"></div><div></div>
<div></div><div></div><div></div>
</div>

<div class="face back">
<div class="dot"></div><div></div><div class="dot"></div>
<div></div><div class="dot"></div><div></div>
<div class="dot"></div><div></div><div class="dot"></div>
</div>

<div class="face right">
<div class="dot"></div><div></div><div class="dot"></div>
<div></div><div class="dot"></div><div></div>
<div class="dot"></div><div></div><div class="dot"></div>
</div>

<div class="face left">
<div class="dot"></div><div></div><div class="dot"></div>
<div></div><div></div><div></div>
<div class="dot"></div><div></div><div class="dot"></div>
</div>

<div class="face top">
<div class="dot"></div><div></div><div class="dot"></div>
<div></div><div class="dot"></div><div></div>
<div></div><div></div><div></div>
</div>

<div class="face bottom">
<div></div><div></div><div></div>
<div class="dot"></div><div></div><div class="dot"></div>
<div></div><div></div><div></div>
</div>

</div>
</div>

<button onclick="roll()">Tirar dado</button>

<div id="resultado"></div>

<script>

const cube=document.getElementById("cube");

function roll(){

let numero=Math.floor(Math.random()*6)+1;

let rotaciones={
1:"rotateX(0deg) rotateY(0deg)",
2:"rotateX(-90deg)",
3:"rotateY(-90deg)",
4:"rotateY(90deg)",
5:"rotateX(90deg)",
6:"rotateX(180deg)"
};

let extraX=360*(Math.floor(Math.random()*3)+1);
let extraY=360*(Math.floor(Math.random()*3)+1);

cube.style.transform=
`rotateX(${extraX}deg) rotateY(${extraY}deg) `+
rotaciones[numero];

document.getElementById("resultado").innerText=
"Salió el número: "+numero;

}

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(drawStars);

}

drawStars();

</script>

</body>
</html>
